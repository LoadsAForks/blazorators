name: build and test

on:
  workflow_call:
  push:
    branches: [ main ]
    paths-ignore:
    - README.md
  workflow_dispatch:
    inputs:
      reason:
        description: The reason for running the workflow
        required: true
        default: Manual run

jobs:
  repository_build:
    name: repository build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        global-json-file: global.json

    - name: Build from repository root
      run: dotnet build --configuration Release

  build:
    name: build (Blazor.${{ matrix.component }}${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
        - LocalStorage
        - SessionStorage
        - Geolocation
        - SpeechSynthesis
        - SpeechRecognition
        - DOM
        - Permissions
        - WakeLock
        - Clipboard
        - Share
        - StorageManagement
        - Screen
        - OfflineStorage
        - BrowserCoordination
        - Performance
        - Credentials
        - WebCrypto
        - MediaDevices
        - Notifications
        - FileSystemAccess
        variant: [ '', '.WebAssembly' ]
        include:
        - component: SourceGenerators
          variant: ''
        - component: Serialization
          variant: ''
    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        global-json-file: global.json

    - name: Build
      run: dotnet build ./src/Blazor.${{ matrix.component }}${{ matrix.variant }}/Blazor.${{ matrix.component }}${{ matrix.variant }}.csproj --configuration Release

  unit_tests:
    name: unit tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
        - Blazor.SourceGenerators.Tests
        - Blazor.DOM.CSharpGenerator.Tests
        - Blazor.WakeLock.Tests
        - Blazor.Clipboard.Tests
        - Blazor.Share.Tests
        - Blazor.StorageManagement.Tests
        - Blazor.Screen.Tests
        - Blazor.OfflineStorage.Tests
        - Blazor.BrowserCoordination.Tests
        - Blazor.Performance.Tests
        - Blazor.Credentials.Tests
        - Blazor.WebCrypto.Tests
        - Blazor.FileSystemAccess.Tests

    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        global-json-file: global.json

    - name: Test
      run: dotnet test ./tests/${{ matrix.project }}/${{ matrix.project }}.csproj --configuration Release --framework net10.0 --verbosity normal

  runtime_tests:
    name: DOM runtime tests (${{ matrix.framework }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net9.0, net10.0 ]

    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Test
      run: dotnet test ./tests/Blazor.DOM.Tests/Blazor.DOM.Tests.csproj --configuration Release --framework ${{ matrix.framework }} --verbosity normal

  compilation_tests:
    name: compilation (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
        - Blazor.DOM.GlobalNamespace.CompilationTests
        - Blazor.DOM.Generic.CompilationTests
        - Blazor.DOM.WakeLock.CompilationTests
        - Blazor.DOM.AdvancedTypes.CompilationTests
        - Blazor.DOM.TypedUnions.CompilationTests
        - Blazor.DOM.Accessors.CompilationTests
        - Blazor.DOM.TypedEvents.CompilationTests
        - Blazor.DOM.NonEventDeferrals.CompilationTests
        - Blazor.DOM.ResolvedFailures.CompilationTests
        - Blazor.DOM.SupplementalBrowserApis.CompilationTests
        - Blazor.DOM.Server.CompilationTests
        - Blazor.DOM.WebAssembly.CompilationTests

    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        global-json-file: global.json

    - name: Build all target frameworks with warnings as errors
      run: dotnet build ./tests/${{ matrix.project }}/${{ matrix.project }}.csproj --configuration Release --warnaserror

  browser_tests:
    name: browser tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - suite: DOM interop
          filter: Category=DOMEndToEnd
        - suite: existing samples
          filter: Category!=DOMEndToEnd

    steps:
    - uses: actions/checkout@main

    - name: Setup .NET
      uses: actions/setup-dotnet@main
      with:
        global-json-file: global.json

    - name: Build end-to-end tests
      run: dotnet build ./tests/Blazor.ExampleConsumer.EndToEndTests/Blazor.ExampleConsumer.EndToEndTests.csproj --configuration Release

    - name: Install Playwright dependencies
      run: pwsh ./artifacts/bin/Blazor.ExampleConsumer.EndToEndTests/release/playwright.ps1 install --with-deps

    - name: Test
      run: dotnet test ./tests/Blazor.ExampleConsumer.EndToEndTests/Blazor.ExampleConsumer.EndToEndTests.csproj --configuration Release --no-build --filter "${{ matrix.filter }}" --verbosity normal

  test:
    name: test
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
    - repository_build
    - build
    - unit_tests
    - runtime_tests
    - compilation_tests
    - browser_tests
    steps:
    - name: Require every test matrix
      env:
        REPOSITORY_BUILD: ${{ needs.repository_build.result }}
        BUILD: ${{ needs.build.result }}
        UNIT_TESTS: ${{ needs.unit_tests.result }}
        RUNTIME_TESTS: ${{ needs.runtime_tests.result }}
        COMPILATION_TESTS: ${{ needs.compilation_tests.result }}
        BROWSER_TESTS: ${{ needs.browser_tests.result }}
      run: |
        for result in "$REPOSITORY_BUILD" "$BUILD" "$UNIT_TESTS" "$RUNTIME_TESTS" "$COMPILATION_TESTS" "$BROWSER_TESTS"; do
          if [ "$result" != "success" ]; then
            echo "A test matrix completed with status: $result"
            exit 1
          fi
        done
