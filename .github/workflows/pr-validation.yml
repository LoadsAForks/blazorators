name: pull request

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ main ]
    paths:
    - '**.cs'
    - '**.razor'
    - '**.html'
    - '**.css'
    - '**.js'
    - '**.json'
    - '**.csproj'
    - '**.sln'
    - '.github/workflows/**'

jobs:
  validate:
    name: validate
    uses: ./.github/workflows/build-validation.yml
