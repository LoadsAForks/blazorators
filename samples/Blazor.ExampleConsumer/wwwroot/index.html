<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blazorators · Source-generated JS interop for Blazor</title>
    <meta name="description" content="Blazorators ships compile-time, source-generated JavaScript interop bindings for Blazor — local storage, geolocation, speech synthesis, speech recognition, and more." />
    <base href="/" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/neon-tattoo.css" />
    <link rel="stylesheet" href="Blazor.ExampleConsumer.styles.css" />

    <script>
        // Pre-paint theme apply — runs *before* Blazor boots so we never see a
        // light/dark flash on reload. All subsequent theme work goes through
        // Blazor JS interop via theme.js.
        (function () {
            try {
                var stored = localStorage.getItem('theme') || 'dark';
                var resolved = stored === 'system'
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : stored;
                document.documentElement.classList.toggle('dark', resolved === 'dark');
                document.documentElement.setAttribute('data-theme', resolved);
            } catch (e) { /* ignore */ }
        })();
    </script>
</head>
<body>
    <div id="app">
        <div class="splash" role="status" aria-live="polite">
            <div class="splash-logo" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="splash-title">Blazorators</div>
            <div class="splash-sub">Booting Blazor WebAssembly…</div>
        </div>
    </div>

    <div id="blazor-error-ui" hidden>
        <div class="msg">
            An unhandled error has occurred.
            <button class="reload">Reload</button>
            <button class="dismiss" aria-label="Dismiss">×</button>
        </div>
    </div>

    <script src="_content/Blazor.Geolocation.WebAssembly/blazorators.geolocation.g.js"></script>
    <script src="_content/Blazor.SpeechSynthesis.WebAssembly/blazorators.speechSynthesis.g.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        (() => {
            const retryableStatusCodes = new Set([408, 429, 500, 502, 503, 504]);
            const maxBootResourceAttempts = 3;
            const errorUi = document.getElementById('blazor-error-ui');

            errorUi.querySelector('.reload').addEventListener('click', () => location.reload());
            errorUi.querySelector('.dismiss').addEventListener('click', () => {
                errorUi.hidden = true;
                errorUi.style.removeProperty('display');
            });

            function loadBootResource(_type, _name, defaultUri, integrity) {
                if (_type === 'dotnetjs') {
                    return defaultUri;
                }

                return fetchBootResourceWithRetry(defaultUri, integrity);
            }

            async function fetchBootResourceWithRetry(defaultUri, integrity) {
                for (let attempt = 1; attempt <= maxBootResourceAttempts; attempt++) {
                    const uri = new URL(defaultUri, document.baseURI);
                    if (attempt > 1) {
                        uri.searchParams.set('blazor-retry', `${attempt - 1}-${Date.now()}`);
                    }

                    const requestOptions = {
                        cache: attempt === 1 ? 'default' : 'reload'
                    };
                    if (integrity) {
                        requestOptions.integrity = integrity;
                    }

                    try {
                        const response = await fetch(uri, requestOptions);
                        if (response.ok ||
                            !retryableStatusCodes.has(response.status) ||
                            attempt === maxBootResourceAttempts) {
                            return response;
                        }
                    } catch (error) {
                        if (attempt === maxBootResourceAttempts) {
                            throw error;
                        }
                    }

                    await new Promise(resolve =>
                        setTimeout(resolve, 200 * 2 ** (attempt - 1)));
                }
            }

            Blazor.start({ loadBootResource }).catch(error => {
                console.error('Blazor failed to start.', error);
                errorUi.hidden = false;
                errorUi.style.display = 'flex';
            });
        })();
    </script>
</body>
</html>
